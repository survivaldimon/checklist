<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kabinet — Предрелизное тестирование</title>
<!-- No external dependencies -->
<style>
:root {
  --bg: #0f0f17;
  --surface: #1a1a2e;
  --surface2: #232340;
  --border: #2d2d4a;
  --text: #e8e8f0;
  --text2: #9898b0;
  --purple: #8B5CF6;
  --purple-bg: rgba(139,92,246,0.12);
  --purple-border: rgba(139,92,246,0.25);
  --green: #10B981;
  --green-bg: rgba(16,185,129,0.12);
  --yellow: #F59E0B;
  --yellow-bg: rgba(245,158,11,0.12);
  --red: #EF4444;
  --red-bg: rgba(239,68,68,0.12);
  --red-border: rgba(239,68,68,0.25);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans','Inter',-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
a { color:var(--purple); text-decoration:none; }

/* Header */
.header { position:sticky; top:0; z-index:100; background:var(--surface); border-bottom:1px solid var(--border); padding:16px 24px; }
.header-top { display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
.header h1 { font-size:20px; font-weight:800; display:flex; align-items:center; gap:10px; }
.header h1 span { background:linear-gradient(135deg,#7C5CFC,#9B7FFF); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.sync-status { font-size:12px; color:var(--text2); display:flex; align-items:center; gap:6px; }
.sync-dot { width:8px; height:8px; border-radius:50%; background:var(--green); }
.sync-dot.offline { background:var(--red); }
.sync-dot.syncing { background:var(--yellow); animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }

/* Overall progress */
.overall { margin:12px 0 0; }
.overall-bar-wrap { height:8px; background:var(--surface2); border-radius:4px; overflow:hidden; margin-top:6px; }
.overall-bar { height:100%; background:linear-gradient(90deg,#7C5CFC,#9B7FFF); border-radius:4px; transition:width 0.4s ease; }
.overall-label { font-size:13px; color:var(--text2); display:flex; justify-content:space-between; }

/* Filters */
.filters { display:flex; gap:8px; padding:12px 24px; flex-wrap:wrap; align-items:center; }
.filter-chip { padding:6px 14px; border-radius:10px; border:1px solid var(--border); background:var(--surface); color:var(--text2); font-size:12px; font-weight:600; cursor:pointer; transition:all 0.2s; }
.filter-chip:hover { border-color:var(--purple-border); color:var(--text); }
.filter-chip.active { background:var(--purple-bg); border-color:var(--purple); color:var(--purple); }
.filter-sep { color:var(--border); font-size:14px; }
.search-box { padding:6px 12px; border-radius:10px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:12px; width:200px; outline:none; }
.search-box:focus { border-color:var(--purple); }
.search-box::placeholder { color:var(--text2); }

/* Content */
.content { padding:0 24px 80px; }

/* Section */
.section { margin:20px 0; border:1px solid var(--border); border-radius:14px; overflow:hidden; background:var(--surface); }
.section-header { padding:14px 18px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; user-select:none; }
.section-header:hover { background:var(--surface2); }
.section-title { font-size:15px; font-weight:700; display:flex; align-items:center; gap:10px; }
.section-arrow { transition:transform 0.2s; font-size:12px; color:var(--text2); }
.section-arrow.open { transform:rotate(90deg); }
.section-right { display:flex; align-items:center; gap:14px; }
.section-count { font-size:12px; color:var(--text2); }
.section-bar-wrap { width:120px; height:6px; background:var(--surface2); border-radius:3px; overflow:hidden; }
.section-bar { height:100%; background:linear-gradient(90deg,#7C5CFC,#9B7FFF); border-radius:3px; transition:width 0.4s ease; }
.section-pct { font-size:13px; font-weight:700; color:var(--purple); min-width:36px; text-align:right; }

/* Table */
.section-body { display:none; }
.section-body.open { display:block; }
.test-table { width:100%; border-collapse:collapse; }
.test-table th { padding:8px 10px; font-size:11px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; text-align:left; border-bottom:1px solid var(--border); background:var(--surface2); position:sticky; top:0; }
.test-table th.check-col { text-align:center; width:44px; }
.test-table td { padding:7px 10px; font-size:13px; border-bottom:1px solid rgba(45,45,74,0.5); vertical-align:top; }
.test-table tr:hover td { background:rgba(139,92,246,0.04); }
.test-table tr.hidden { display:none; }
.test-num { color:var(--text2); font-size:12px; font-family:monospace; white-space:nowrap; }
.test-name { font-weight:500; }
.test-steps { color:var(--text2); font-size:12px; max-width:400px; }
.role-badge { display:inline-block; padding:1px 6px; border-radius:6px; font-size:10px; font-weight:700; }
.role-O { background:var(--yellow-bg); color:var(--yellow); }
.role-T { background:var(--green-bg); color:var(--green); }
.role-A { background:var(--purple-bg); color:var(--purple); }
.role-OT { background:var(--red-bg); color:var(--red); }
.priority-P1 { color:var(--red); font-weight:700; font-size:11px; }
.priority-P2 { color:var(--yellow); font-size:11px; }
.priority-P3 { color:var(--text2); font-size:11px; }
.scope-badge { font-size:10px; padding:1px 6px; border-radius:6px; font-weight:600; }
.scope-visual { background:var(--green-bg); color:var(--green); }
.scope-logic { background:rgba(152,152,176,0.15); color:var(--text2); }

/* Checkboxes */
.check-cell { text-align:center; }
.check-cell input[type=checkbox] { appearance:none; width:20px; height:20px; border:2px solid var(--border); border-radius:6px; cursor:pointer; transition:all 0.15s; position:relative; }
.check-cell input[type=checkbox]:hover { border-color:var(--purple); }
.check-cell input[type=checkbox]:checked { background:var(--purple); border-color:var(--purple); }
.check-cell input[type=checkbox]:checked::after { content:'✓'; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#fff; font-size:12px; font-weight:700; }

/* Bug checkbox */
.bug-cell { text-align:center; }
.bug-cell input[type=checkbox] { appearance:none; width:20px; height:20px; border:2px solid var(--border); border-radius:6px; cursor:pointer; transition:all 0.15s; position:relative; }
.bug-cell input[type=checkbox]:hover { border-color:var(--red); }
.bug-cell input[type=checkbox]:checked { background:var(--red); border-color:var(--red); }
.bug-cell input[type=checkbox]:checked::after { content:'🐛'; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:11px; }

/* Bug comment */
.bug-input { background:transparent; border:1px solid transparent; color:var(--text); font-size:12px; padding:3px 6px; border-radius:6px; width:100%; min-width:120px; outline:none; }
.bug-input:hover { border-color:var(--border); }
.bug-input:focus { border-color:var(--purple); background:var(--surface2); }
.bug-input.has-value { color:var(--red); border-color:var(--red-border); background:var(--red-bg); }

/* Bug counter */
.bug-count { font-size:11px; color:var(--red); font-weight:600; display:none; align-items:center; gap:3px; }
.bug-count.visible { display:inline-flex; }
.overall-bugs { font-size:13px; color:var(--red); font-weight:600; display:none; align-items:center; gap:4px; }
.overall-bugs.visible { display:flex; }

/* Responsive */
@media(max-width:900px) {
  .test-steps { display:none; }
  .filters { padding:8px 12px; }
  .content { padding:0 8px 80px; }
  .header { padding:12px; }
  .section-bar-wrap { width:60px; }
}
</style>
</head>

<div class="header">
  <div class="header-top">

  </div>
  <div class="overall">

    <div class="overall-bar-wrap"><div class="overall-bar" id="overallBar" style="width:0%"></div></div>

</div>

// ── Storage: fetch API → Supabase REST + localStorage fallback ──
const API_URL = 'https://ncfpxetzmeeqxgqidosj.supabase.co/rest/v1/test_checks';
const API_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5jZnB4ZXR6bWVlcXhncWlkb3NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjYyMTk4NDEsImV4cCI6MjA4MTc5NTg0MX0.lNmvsQc5e6VvN_hbnhfzdz3Y7FhpiRNockXiXqGJ7vQ';
const HEADERS = {'apikey':API_KEY,'Authorization':'Bearer '+API_KEY,'Content-Type':'application/json','Prefer':'return=minimal'};
const LS_KEY = 'kabinet_test_checks';
const POLL_INTERVAL = 10000; // 10 sec

let useCloud = false;
let dbState = {};
let pollTimer = null;

function initStorage() { /* no-op, cloud tested in loadFromDB */ }

async function loadFromDB() {
  // 1) localStorage instant
  try {
    const stored = localStorage.getItem(LS_KEY);
    if (stored) { dbState = JSON.parse(stored); applyDBToUI(); }
  } catch(e) {}

  // 2) Try cloud
  try {
    setSyncStatus('syncing', 'Загрузка...');
    const res = await fetch(API_URL+'?select=*', {headers:{'apikey':API_KEY,'Authorization':'Bearer '+API_KEY}});
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    const cloudState = {};
    data.forEach(r => { cloudState[r.test_id] = {ru:r.ru,en:r.en,light:r.light,dark:r.dark,bug:r.bug||false,bug_comment:r.bug_comment||''}; });
    dbState = {...dbState, ...cloudState};
    saveToLS();
    applyDBToUI();
    useCloud = true;
    setSyncStatus('online', 'Синхронизировано');
    startPolling();
  } catch(e) {
    console.warn('Cloud unavailable:', e);
    setSyncStatus('offline', 'Локальный режим');
    useCloud = false;
  }
}

function saveToLS() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(dbState)); } catch(e) {}
}

function applyDBToUI() {
  TESTS.forEach(t => {
    const id = t[2], s = dbState[id];
    if (!s) return;
    ['ru','en','light','dark','bug'].forEach(col => {
      const el = document.getElementById('chk_'+id+'_'+col);
      if (el) el.checked = s[col];
    });
    const bugEl = document.getElementById('bug_'+id);
    if (bugEl) { bugEl.value = s.bug_comment||''; if(s.bug_comment) bugEl.classList.add('has-value'); }
  });
  recalcAll();
}

async function saveCheck(testId, col, val) {
  if (!dbState[testId]) dbState[testId] = {ru:false,en:false,light:false,dark:false,bug:false,bug_comment:''};
  dbState[testId][col] = val;
  saveToLS();
  if (!useCloud) return;

  setSyncStatus('syncing', 'Сохранение...');
  try {
    const body = {test_id:testId, ...dbState[testId], updated_at:new Date().toISOString()};
    const res = await fetch(API_URL+'?on_conflict=test_id', {
      method:'POST', headers:{...HEADERS,'Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify(body)
    });
    if (!res.ok) throw new Error(res.status);
    setSyncStatus('online', 'Синхронизировано');
  } catch(e) {
    console.warn('Save failed:', e);
    setSyncStatus('offline', 'Офлайн (локально)');
  }
}

// Polling instead of Realtime (no SDK needed)
function startPolling() {
  if (pollTimer) return;
  pollTimer = setInterval(async () => {
    if (!useCloud) return;
    try {
      const res = await fetch(API_URL+'?select=*', {headers:{'apikey':API_KEY,'Authorization':'Bearer '+API_KEY}});
      if (!res.ok) return;
      const data = await res.json();
      let changed = false;
      data.forEach(r => {
        const cur = dbState[r.test_id];
        const fresh = {ru:r.ru,en:r.en,light:r.light,dark:r.dark,bug:r.bug||false,bug_comment:r.bug_comment||''};
        if (!cur || JSON.stringify(cur)!==JSON.stringify(fresh)) {
          dbState[r.test_id] = fresh;
          changed = true;
          ['ru','en','light','dark','bug'].forEach(col => {
            const el = document.getElementById('chk_'+r.test_id+'_'+col);
            if (el) el.checked = fresh[col];
          });
          const bugEl = document.getElementById('bug_'+r.test_id);
          if (bugEl) { bugEl.value = fresh.bug_comment; bugEl.classList.toggle('has-value',!!fresh.bug_comment); }
        }
      });
      if (changed) { saveToLS(); recalcAll(); }
    } catch(e) {}
  }, POLL_INTERVAL);
}

function subscribeRealtime() { /* replaced by polling */ }

function setSyncStatus(state, label) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  dot.className = 'sync-dot'+(state==='offline'?' offline':'')+(state==='syncing'?' syncing':'');
  lbl.textContent = label;
}

// ── UI Build ──

  let html = '';
  Object.entries(sections).forEach(([secName, tests]) => {
    const secId = secName.replace(/[^а-яА-Яa-zA-Z0-9]/g,'_');
    html += `<div class="section" data-section="${secId}">
      <div class="section-header" onclick="toggleSection('${secId}')">
        <div class="section-title"><span class="section-arrow" id="arrow_${secId}">▶</span>${secName}</div>
        <div class="section-right">
          <span class="section-count" id="count_${secId}">0/${tests.length*4}</span>
          <span class="bug-count" id="bugs_${secId}">🐛 <span id="bugn_${secId}">0</span></span>
          <div class="section-bar-wrap"><div class="section-bar" id="bar_${secId}" style="width:0%"></div></div>
          <span class="section-pct" id="pct_${secId}">0%</span>
        </div>
      </div>
      <div class="section-body" id="body_${secId}">
        <table class="test-table"><thead><tr>
          <th style="width:50px">#</th><th>Тест</th><th>Шаги</th><th style="width:40px">Роль</th><th style="width:32px">P</th><th style="width:44px">Тип</th>
          <th class="check-col">RU</th><th class="check-col">EN</th><th class="check-col">☀️</th><th class="check-col">🌙</th>
          <th class="check-col">🐛</th><th>Описание бага</th>
        </tr></thead><tbody>`;
    tests.forEach(t => {
      const roleClass = t.role==='O+T'?'OT':t.role;
      html += `<tr class="test-row" data-priority="${t.priority}" data-id="${t.num}" data-section="${secId}">
        <td class="test-num">${t.num}</td>
        <td class="test-name">${t.name}</td>
        <td class="test-steps">${t.steps}</td>
        <td><span class="role-badge role-${roleClass}">${t.role}</span></td>
        <td><span class="priority-${t.priority}">${t.priority}</span></td>
        <td><span class="scope-badge scope-${t.scope==='Визуал'?'visual':'logic'}">${t.scope==='Визуал'?'👁':'⚙'}</span></td>
        <td class="check-cell"><input type="checkbox" id="chk_${t.num}_ru" onchange="onCheck('${t.num}','ru',this.checked)"></td>
        <td class="check-cell"><input type="checkbox" id="chk_${t.num}_en" onchange="onCheck('${t.num}','en',this.checked)"></td>
        <td class="check-cell"><input type="checkbox" id="chk_${t.num}_light" onchange="onCheck('${t.num}','light',this.checked)"></td>
        <td class="check-cell"><input type="checkbox" id="chk_${t.num}_dark" onchange="onCheck('${t.num}','dark',this.checked)"></td>
        <td class="bug-cell"><input type="checkbox" id="chk_${t.num}_bug" onchange="onCheck('${t.num}','bug',this.checked)"></td>
        <td><input class="bug-input" type="text" id="bug_${t.num}" placeholder="—" onchange="onBug('${t.num}',this.value)" oninput="this.classList.toggle('has-value',!!this.value)"></td>
      </tr>`;
    });
    html += `</tbody></table></div></div>`;
  });
  content.innerHTML = html;
}

function toggleSection(id) {
  const body = document.getElementById('body_'+id);
  const arrow = document.getElementById('arrow_'+id);
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}

// ── Handlers ──
let debounceTimers = {};

function onCheck(testId, col, val) {
  saveCheck(testId, col, val);
  recalcAll();
}

function onBug(testId, val) {
  clearTimeout(debounceTimers[testId]);
  debounceTimers[testId] = setTimeout(() => saveCheck(testId, 'bug_comment', val), 500);
}

// ── Recalc ──
function recalcAll() {
  const sections = {};
  let totalChecked = 0, totalAll = 0, totalBugs = 0;

  TESTS.forEach(t => {
    const sec = t[0].replace(/[^а-яА-Яa-zA-Z0-9]/g,'_');
    if (!sections[sec]) sections[sec] = {checked:0, total:0, bugs:0};
    ['ru','en','light','dark'].forEach(col => {
      sections[sec].total++;
      totalAll++;
      const el = document.getElementById(`chk_${t[2]}_${col}`);
      if (el && el.checked) { sections[sec].checked++; totalChecked++; }
    });
    // Count bug checkboxes
    const bugEl = document.getElementById(`chk_${t[2]}_bug`);
    if (bugEl && bugEl.checked) { sections[sec].bugs++; totalBugs++; }
  });

  Object.entries(sections).forEach(([sec, s]) => {
    const pct = s.total ? Math.round(s.checked/s.total*100) : 0;
    const countEl = document.getElementById('count_'+sec);
    const barEl = document.getElementById('bar_'+sec);
    const pctEl = document.getElementById('pct_'+sec);
    const bugsEl = document.getElementById('bugs_'+sec);
    const bugnEl = document.getElementById('bugn_'+sec);
    if(countEl) countEl.textContent = `${s.checked}/${s.total}`;
    if(barEl) barEl.style.width = pct+'%';
    if(pctEl) pctEl.textContent = pct+'%';
    if(bugsEl) bugsEl.classList.toggle('visible', s.bugs>0);
    if(bugnEl) bugnEl.textContent = s.bugs;
  });

  const overallPct = totalAll ? Math.round(totalChecked/totalAll*100) : 0;
  document.getElementById('overallLabel').textContent = `${totalChecked} / ${totalAll}`;
  document.getElementById('overallPct').textContent = overallPct+'%';
  document.getElementById('overallBar').style.width = overallPct+'%';
  const overallBugsEl = document.getElementById('overallBugs');
  document.getElementById('overallBugCount').textContent = totalBugs;
  if(overallBugsEl) overallBugsEl.classList.toggle('visible', totalBugs>0);
}

// ── Filters ──
let activeFilter = 'all';
document.addEventListener('click', e => {
  if (!e.target.classList.contains('filter-chip')) return;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  e.target.classList.add('active');
  activeFilter = e.target.dataset.filter;
  applyFilters();
});

document.getElementById('searchBox').addEventListener('input', () => applyFilters());

function applyFilters() {
  const search = document.getElementById('searchBox').value.toLowerCase();
  document.querySelectorAll('.test-row').forEach(row => {
    const id = row.dataset.id;
    const priority = row.dataset.priority;
    const name = row.querySelector('.test-name').textContent.toLowerCase();
    const steps = row.querySelector('.test-steps')?.textContent.toLowerCase()||'';
    const bug = document.getElementById('bug_'+id)?.value||'';

    let show = true;
    if (search && !name.includes(search) && !steps.includes(search) && !id.includes(search)) show = false;
    if (activeFilter==='P1'||activeFilter==='P2'||activeFilter==='P3') { if(priority!==activeFilter) show=false; }
    if (activeFilter==='unchecked') {
      const anyChecked = ['ru','en','light','dark'].some(c => document.getElementById(`chk_${id}_${c}`)?.checked);
      if (anyChecked) show = false;
    }
    if (activeFilter==='bugs') {
      const bugChecked = document.getElementById(`chk_${id}_bug`)?.checked;
      if(!bug && !bugChecked) show=false;
    }
    row.classList.toggle('hidden', !show);
  });
}
